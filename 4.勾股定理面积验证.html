<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>勾股定理水流动画演示</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: "Microsoft YaHei", Arial, sans-serif;
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 15px;
            color: white;
            overflow-x: hidden;
        }
        
        h1 {
            font-size: 2.2em;
            margin-bottom: 5px;
            text-shadow: 0 0 20px rgba(79, 195, 247, 0.8);
            background: linear-gradient(90deg, #4fc3f7, #81d4fa, #4fc3f7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .subtitle {
            font-size: 1.2em;
            margin-bottom: 10px;
            color: #b0bec5;
        }
        
        .canvas-container {
            position: relative;
            margin: 5px;
            padding: 15px;
            background: rgba(255,255,255,0.05);
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
        }
        
        canvas {
            display: block;
            border-radius: 10px;
            cursor: pointer;
        }
        
        .controls {
            display: flex;
            gap: 20px;
            margin-top: 15px;
        }
        
        button {
            padding: 14px 35px;
            font-size: 1.2em;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: bold;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.3);
            position: relative;
            overflow: hidden;
        }
        
        button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: left 0.5s;
        }
        
        button:hover::before {
            left: 100%;
        }
        
        .btn-pour {
            background: linear-gradient(145deg, #00bcd4, #0097a7);
            color: white;
            box-shadow: 0 6px 20px rgba(0,188,212,0.5);
        }
        
        .btn-pour:hover:not(:disabled) {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(0,188,212,0.7);
        }
        
        .btn-reset {
            background: linear-gradient(145deg, #ff7043, #e64a19);
            color: white;
            box-shadow: 0 6px 20px rgba(255,112,67,0.5);
        }
        
        .btn-reset:hover:not(:disabled) {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(255,112,67,0.7);
        }
        
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none !important;
        }
        
        .info-panel {
            margin-top: 15px;
            padding: 15px 30px;
            background: rgba(255,255,255,0.1);
            border-radius: 12px;
            text-align: center;
            backdrop-filter: blur(10px);
        }
        
        .formula {
            font-size: 2em;
            font-weight: bold;
            color: #4fc3f7;
            text-shadow: 0 0 15px rgba(79, 195, 247, 0.5);
            margin-bottom: 8px;
        }
        
        .values {
            font-size: 1.5em;
            color: #81d4fa;
        }
        
        .legend {
            display: flex;
            gap: 25px;
            margin-top: 12px;
            font-size: 1em;
            flex-wrap: wrap;
            justify-content: center;
        }
        
        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .legend-color {
            width: 24px;
            height: 24px;
            border-radius: 6px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
        }
        
        .water-a { background: linear-gradient(135deg, #2196f3, #1976d2); }
        .water-b { background: linear-gradient(135deg, #03a9f4, #0288d1); }
        .water-c { background: linear-gradient(135deg, #00bcd4, #0097a7); }
        
        .instruction {
            margin-top: 12px;
            color: #90a4ae;
            font-size: 1em;
            text-align: center;
        }
        
        /* 题目框样式 */
        .question-box {
            background: #fff8dc;
            border: 2px solid #d4a017;
            border-radius: 10px;
            padding: 12px 15px;
            margin-bottom: 15px;
            font-size: 14px;
            color: #5d4e0e;
            line-height: 1.6;
            text-align: center;
        }
        .question-box strong {
            color: #8b6914;
        }
        
        .progress-bar {
            width: 250px;
            height: 8px;
            background: rgba(255,255,255,0.2);
            border-radius: 4px;
            margin-top: 10px;
            overflow: hidden;
        }
        
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #2196f3, #00bcd4);
            width: 0%;
            transition: width 0.1s;
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <h1>🔺 勾股定理水流动画 🔺</h1>
    <p class="subtitle">a² + b² = c² 的几何证明</p>
    
    <div class="question-box">
        <strong>📖 题目：</strong>直角三角形中，两直角边上的正方形面积之和等于斜边上的正方形面积，即 a² + b² = c²。拖动顶点改变边长比例，点击"开始倾倒"观察水流动画验证勾股定理。
    </div>
    
    <div class="canvas-container">
        <canvas id="canvas"></canvas>
    </div>
    
    <div class="controls">
        <button class="btn-pour" id="pourBtn" onclick="startPour()">
            🌊 开始倾倒
        </button>
        <button class="btn-reset" id="resetBtn" onclick="resetAnimation()">
            🔄 重置
        </button>
    </div>
    
    <div class="info-panel">
        <div class="formula" id="formula">3² + 4² = 5²</div>
        <div class="values" id="values">9 + 16 = 25</div>
        <div class="progress-bar">
            <div class="progress-fill" id="progressFill"></div>
        </div>
        <div class="legend">
            <div class="legend-item">
                <div class="legend-color water-a"></div>
                <span>边长 <strong>a</strong> 的正方形</span>
            </div>
            <div class="legend-item">
                <div class="legend-color water-b"></div>
                <span>边长 <strong>b</strong> 的正方形</span>
            </div>
            <div class="legend-item">
                <div class="legend-color water-c"></div>
                <span>边长 <strong>c</strong> 的正方形</span>
            </div>
        </div>
    </div>
    
    <p class="instruction">💡 提示：拖动三角形顶点 B 或 C 可以改变边长比例</p>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        
        // 画布大小
        const CANVAS_WIDTH = 1000;
        const CANVAS_HEIGHT = 800;
        canvas.width = CANVAS_WIDTH;
        canvas.height = CANVAS_HEIGHT;
        
        // 三角形顶点 - 直角在A点
        let A, B, C;
        
        // 动画状态
        let isPouring = false;
        let pourProgress = 0;
        let waterDrops = [];
        let animationId = null;
        let waveOffset = 0;
        let dropIntervalId = null;  // 全局存储setInterval ID
        
        // 水位状态 (0-1)
        let waterLevelA = 0;
        let waterLevelB = 0;
        let waterLevelC = 1;
        
        // 拖动状态
        let dragging = null;
        
        // 缩放和偏移
        let scale = 1;
        let offsetX = 0;
        let offsetY = 0;
        
        // 初始化三角形位置
        function initTriangle() {
            // 直角三角形，a=120, b=160, c=200 比例 (3:4:5)
            // A是直角顶点
            A = { x: 400, y: 500 };
            B = { x: 400, y: 380 };  // AB = 120 (a边)，垂直向上
            C = { x: 560, y: 500 };   // AC = 160 (b边)，水平向右
            calculateScale();
        }
        
        // 计算缩放和偏移，使所有元素可见
        function calculateScale() {
            const squares = getSquares();
            const margin = 80;
            
            // 收集所有关键点
            const points = [
                { x: A.x, y: A.y },
                { x: B.x, y: B.y },
                { x: C.x, y: C.y }
            ];
            
            // 正方形顶点
            if (squares.squareA.vertices) {
                squares.squareA.vertices.forEach(v => points.push(v));
            }
            if (squares.squareB.vertices) {
                squares.squareB.vertices.forEach(v => points.push(v));
            }
            if (squares.squareC.vertices) {
                squares.squareC.vertices.forEach(v => points.push(v));
            }
            
            let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
            points.forEach(p => {
                minX = Math.min(minX, p.x);
                minY = Math.min(minY, p.y);
                maxX = Math.max(maxX, p.x);
                maxY = Math.max(maxY, p.y);
            });
            
            const contentWidth = maxX - minX + margin * 2;
            const contentHeight = maxY - minY + margin * 2;
            
            scale = Math.min(CANVAS_WIDTH / contentWidth, CANVAS_HEIGHT / contentHeight, 1.0);
            
            // 居中偏移
            const centerX = (minX + maxX) / 2;
            const centerY = (minY + maxY) / 2;
            offsetX = CANVAS_WIDTH / 2 - centerX * scale;
            offsetY = CANVAS_HEIGHT / 2 - centerY * scale;
        }
        
        // 变换坐标
        function transformX(x) { return x * scale + offsetX; }
        function transformY(y) { return y * scale + offsetY; }
        function invTransformX(tx) { return (tx - offsetX) / scale; }
        function invTransformY(ty) { return (ty - offsetY) / scale; }
        
        // 计算边长
        function getSides() {
            const a = Math.abs(B.y - A.y);  // AB 垂直边
            const b = Math.abs(C.x - A.x);  // AC 水平边
            const c = Math.sqrt(a * a + b * b);
            return { a, b, c };
        }
        
        // 获取正方形信息 - 完整修复版
        function getSquares() {
            const sides = getSides();
            const a = sides.a;
            const b = sides.b;
            const c = sides.c;
            
            /*
             * 勾股定理图示中，每个正方形以对应的边为一边
             * 三角形: A(直角), B(上方), C(右方)
             * A→B→C 是逆时针
             */
            
            // AB边的正方形：以AB为右边，向左画正方形（三角形外侧）
            // AB是垂直边，从A到B
            // 三角形在AB右边，所以正方形在AB左边（外侧）
            const squareA = {
                x: A.x - a,      // 左边界
                y: B.y,          // 上边界
                size: a,
                angle: 0,
                waterLevel: waterLevelA,
                color: '#2196f3',
                vertices: [
                    { x: A.x - a, y: B.y },       // 左上
                    { x: A.x, y: B.y },           // 右上 = B
                    { x: A.x, y: A.y },           // 右下 = A
                    { x: A.x - a, y: A.y }        // 左下
                ]
            };
            
            // AC边的正方形：以AC为上边，向下画正方形（三角形外侧）
            // AC是水平边，从A到C
            // 三角形在AC上方，所以正方形在AC下方（外侧）
            const squareB = {
                x: A.x,           // 左边界 = A
                y: A.y,           // 上边界 = AC
                size: b,
                angle: 0,
                waterLevel: waterLevelB,
                color: '#03a9f4',
                vertices: [
                    { x: A.x, y: A.y },           // 左上 = A
                    { x: C.x, y: A.y },           // 右上 = C
                    { x: C.x, y: A.y + b },       // 右下
                    { x: A.x, y: A.y + b }        // 左下
                ]
            };
            
            // BC边的正方形：以BC为一条边，向外侧画正方形
            // BC从B(上方)到C(右方)
            // 三角形在BC的左上方，所以BC的外侧在右下方
            
            const BC_dx = C.x - B.x;
            const BC_dy = C.y - B.y;
            const BC_len = c;
            
            // 外侧法线（指向三角形外侧 = 右下方）
            // 三角形A在BC的左上方，外侧法线指向右下方
            const nx = BC_dy / BC_len;   // 正值，向右
            const ny = -BC_dx / BC_len;  // 负值，向下
            
            // 正方形的四个顶点（以BC为一条边）：
            // P1 = B（起点）
            // P2 = C = B + BC（终点）
            // P3 = C + 法线 * c = B + BC + 法线 * c
            // P4 = B + 法线 * c
            
            const P1 = { x: B.x, y: B.y };
            const P2 = { x: C.x, y: C.y };
            const P3 = { x: C.x + nx * c, y: C.y + ny * c };
            const P4 = { x: B.x + nx * c, y: B.y + ny * c };
            
            // 正方形中心（四个顶点的平均）
            const centerX = (P1.x + P2.x + P3.x + P4.x) / 4;
            const centerY = (P1.y + P2.y + P3.y + P4.y) / 4;
            
            // 正方形旋转角度（与BC相同）
            const angle = Math.atan2(BC_dy, BC_dx);
            
            const squareC = {
                x: P1.x,
                y: P1.y,
                size: c,
                angle: angle,
                waterLevel: waterLevelC,
                color: '#00bcd4',
                nx: nx,
                ny: ny,
                vertices: [P1, P2, P3, P4],
                centerX: centerX,
                centerY: centerY
            };
            
            return { squareA, squareB, squareC, sides };
        }
        
        // 颜色加深/变亮
        function shadeColor(color, percent) {
            const num = parseInt(color.replace('#', ''), 16);
            const amt = Math.round(2.55 * percent);
            const R = (num >> 16) + amt;
            const G = (num >> 8 & 0x00FF) + amt;
            const B = (num & 0x0000FF) + amt;
            return '#' + (0x1000000 + 
                (R < 255 ? (R < 1 ? 0 : R) : 255) * 0x10000 + 
                (G < 255 ? (G < 1 ? 0 : G) : 255) * 0x100 + 
                (B < 255 ? (B < 1 ? 0 : B) : 255)
            ).toString(16).slice(1);
        }
        
        // 绘制轴对齐正方形（带水位）
        function drawWaterSquare(sq, label) {
            const { x, y, size, waterLevel, color } = sq;
            
            ctx.save();
            
            const tx = transformX(x);
            const ty = transformY(y);
            const tSize = size * scale;
            
            // 发光效果
            if (waterLevel > 0) {
                ctx.shadowColor = color;
                ctx.shadowBlur = 15 * scale;
            }
            
            // 外边框
            ctx.strokeStyle = '#ffffff';
            ctx.lineWidth = 2.5 * scale;
            ctx.strokeRect(tx, ty, tSize, tSize);
            
            ctx.shadowBlur = 0;
            
            // 背景
            ctx.fillStyle = 'rgba(255,255,255,0.08)';
            ctx.fillRect(tx, ty, tSize, tSize);
            
            // 网格线
            ctx.strokeStyle = 'rgba(255,255,255,0.15)';
            ctx.lineWidth = 1 * scale;
            const gridSize = tSize / 4;
            for (let i = 1; i < 4; i++) {
                ctx.beginPath();
                ctx.moveTo(tx + i * gridSize, ty);
                ctx.lineTo(tx + i * gridSize, ty + tSize);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(tx, ty + i * gridSize);
                ctx.lineTo(tx + tSize, ty + i * gridSize);
                ctx.stroke();
            }
            
            // 水体
            if (waterLevel > 0) {
                const waterHeight = tSize * waterLevel;
                const waterY = ty + tSize - waterHeight;
                
                // 水体渐变
                const gradient = ctx.createLinearGradient(tx, waterY, tx, ty + tSize);
                gradient.addColorStop(0, color);
                gradient.addColorStop(1, shadeColor(color, -30));
                
                ctx.fillStyle = gradient;
                ctx.fillRect(tx, waterY, tSize, waterHeight);
                
                // 水面波浪
                ctx.fillStyle = 'rgba(255,255,255,0.4)';
                ctx.beginPath();
                ctx.moveTo(tx, waterY);
                const waveStep = tSize / 20;
                for (let wx = 0; wx <= tSize; wx += waveStep) {
                    const waveY = waterY + Math.sin((wx / scale + waveOffset) * 0.15) * 3 * scale;
                    ctx.lineTo(tx + wx, waveY);
                }
                ctx.lineTo(tx + tSize, waterY + 10 * scale);
                ctx.lineTo(tx, waterY + 10 * scale);
                ctx.closePath();
                ctx.fill();
                
                // 水滴效果
                ctx.fillStyle = 'rgba(255,255,255,0.6)';
                for (let i = 0; i < 3; i++) {
                    const dx = tx + tSize * (0.2 + i * 0.3);
                    const dy = waterY + 10 * scale + (waveOffset * 0.5 + i * 10) % 20;
                    ctx.beginPath();
                    ctx.arc(dx, dy, 3 * scale, 0, Math.PI * 2);
                    ctx.fill();
                }
            }
            
            // 标签
            ctx.fillStyle = waterLevel > 0.3 ? '#ffffff' : '#b0bec5';
            ctx.font = `bold ${16 * scale}px Arial`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(label, tx + tSize / 2, ty + tSize / 2);
            
            ctx.restore();
        }
        
        // 绘制旋转正方形（带水位）- 修复版
        function drawRotatedWaterSquare(sq, label) {
            const { size, angle, waterLevel, color, centerX, centerY, vertices } = sq;
            
            ctx.save();
            
            const tx = transformX(centerX);
            const ty = transformY(centerY);
            const tSize = size * scale;
            const half = tSize / 2;
            
            ctx.translate(tx, ty);
            ctx.rotate(angle);
            
            // 发光效果
            if (waterLevel > 0) {
                ctx.shadowColor = color;
                ctx.shadowBlur = 15 * scale;
            }
            
            // 外边框
            ctx.strokeStyle = '#ffffff';
            ctx.lineWidth = 2.5 * scale;
            ctx.strokeRect(-half, -half, tSize, tSize);
            
            ctx.shadowBlur = 0;
            
            // 背景
            ctx.fillStyle = 'rgba(255,255,255,0.08)';
            ctx.fillRect(-half, -half, tSize, tSize);
            
            // 水体
            if (waterLevel > 0) {
                const waterHeight = tSize * waterLevel;
                const waterY = half - waterHeight;
                
                const gradient = ctx.createLinearGradient(0, waterY, 0, half);
                gradient.addColorStop(0, color);
                gradient.addColorStop(1, shadeColor(color, -30));
                
                ctx.fillStyle = gradient;
                ctx.fillRect(-half, waterY, tSize, waterHeight);
                
                // 水面波浪
                ctx.fillStyle = 'rgba(255,255,255,0.4)';
                ctx.beginPath();
                ctx.moveTo(-half, waterY);
                const waveStep = tSize / 20;
                for (let wx = -half; wx <= half; wx += waveStep) {
                    const waveY = waterY + Math.sin((wx / scale + waveOffset) * 0.15) * 3 * scale;
                    ctx.lineTo(wx, waveY);
                }
                ctx.lineTo(half, waterY + 10 * scale);
                ctx.lineTo(-half, waterY + 10 * scale);
                ctx.closePath();
                ctx.fill();
            }
            
            // 标签
            ctx.fillStyle = waterLevel > 0.3 ? '#ffffff' : '#b0bec5';
            ctx.font = `bold ${16 * scale}px Arial`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(label, 0, 0);
            
            ctx.restore();
        }
        
        // 绘制直角三角形
        function drawTriangle() {
            const tA = { x: transformX(A.x), y: transformY(A.y) };
            const tB = { x: transformX(B.x), y: transformY(B.y) };
            const tC = { x: transformX(C.x), y: transformY(C.y) };
            
            // 填充
            ctx.beginPath();
            ctx.moveTo(tA.x, tA.y);
            ctx.lineTo(tB.x, tB.y);
            ctx.lineTo(tC.x, tC.y);
            ctx.closePath();
            ctx.fillStyle = 'rgba(255,255,255,0.12)';
            ctx.fill();
            
            // 边框
            ctx.strokeStyle = '#ffffff';
            ctx.lineWidth = 3 * scale;
            ctx.stroke();
            
            // 直角标记
            const markSize = 15 * scale;
            ctx.beginPath();
            ctx.moveTo(tA.x, tA.y - markSize);
            ctx.lineTo(tA.x, tA.y);
            ctx.lineTo(tA.x + markSize, tA.y);
            ctx.strokeStyle = '#ffeb3b';
            ctx.lineWidth = 2.5 * scale;
            ctx.stroke();
            
            // 顶点标记
            ctx.fillStyle = '#ffeb3b';
            ctx.beginPath();
            ctx.arc(tA.x, tA.y, 8 * scale, 0, Math.PI * 2);
            ctx.fill();
            
            // 顶点标签
            ctx.font = `bold ${18 * scale}px Arial`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillStyle = '#ffffff';
            ctx.fillText('A', tA.x - 25 * scale, tA.y + 5);
            ctx.fillText('B', tB.x - 25 * scale, tB.y - 5);
            ctx.fillText('C', tC.x + 25 * scale, tC.y + 5);
            
            // 边长标签
            const sides = getSides();
            ctx.font = `${14 * scale}px Arial`;
            ctx.fillStyle = '#81d4fa';
            // a边 (AB)
            ctx.fillText('a=' + Math.round(sides.a), tA.x - 50 * scale, tA.y - sides.a * scale / 2);
            // b边 (AC)
            ctx.fillText('b=' + Math.round(sides.b), tA.x + sides.b * scale / 2, tA.y + 30 * scale);
        }
        
        // 创建水滴 - 从大正方形C出发
        function createWaterDrop(source) {
            const squares = getSquares();
            const sq = squares.squareC;  // 从大正方形出发
            
            // 随机选择目标 A 或 B
            const target = Math.random() > 0.5 ? 'A' : 'B';
            const color = target === 'A' ? '#2196f3' : '#03a9f4';
            
            // 从源正方形中心位置
            const startX = sq.centerX;
            const startY = sq.centerY;
            
            return {
                startX: startX,
                startY: startY,
                x: startX,
                y: startY,
                vx: (Math.random() - 0.5) * 3,
                vy: -Math.random() * 4 - 3,
                size: Math.random() * 6 + 5,
                color: color,
                life: 1,
                target: target  // 目标正方形
            };
        }
        
        // 绘制水滴
        function drawWaterDrops() {
            waterDrops.forEach(drop => {
                ctx.save();
                
                const tx = transformX(drop.x);
                const ty = transformY(drop.y);
                const tSize = drop.size * scale;
                
                // 水滴主体
                const gradient = ctx.createRadialGradient(
                    tx - tSize/3, ty - tSize/3, 0,
                    tx, ty, tSize
                );
                gradient.addColorStop(0, '#ffffff');
                gradient.addColorStop(0.3, drop.color);
                gradient.addColorStop(1, shadeColor(drop.color, -20));
                
                ctx.fillStyle = gradient;
                ctx.beginPath();
                ctx.arc(tx, ty, tSize, 0, Math.PI * 2);
                ctx.fill();
                
                // 高光
                ctx.fillStyle = 'rgba(255,255,255,0.7)';
                ctx.beginPath();
                ctx.arc(tx - tSize/3, ty - tSize/3, tSize/3, 0, Math.PI * 2);
                ctx.fill();
                
                ctx.restore();
            });
        }
        
        // 更新水滴 - 飞向小正方形
        function updateWaterDrops() {
            const squares = getSquares();
            
            waterDrops = waterDrops.filter(drop => {
                // 根据目标选择正方形
                let target;
                if (drop.target === 'A') {
                    target = squares.squareA;
                } else {
                    target = squares.squareB;
                }
                
                // 目标位置（正方形中心）
                const targetX = target.x + target.size / 2;
                const targetY = target.y + target.size / 2;
                
                // 距离目标
                const dx = targetX - drop.x;
                const dy = targetY - drop.y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                
                if (dist < target.size * 0.2) {
                    return false;
                }
                
                // 向目标移动
                const speed = 0.08;
                drop.x += dx * speed + drop.vx * 0.2;
                drop.y += dy * speed + drop.vy * 0.2;
                
                // 添加重力效果
                drop.vy += 0.15;
                
                // 限制速度
                drop.vx *= 0.98;
                
                // 更新生命周期
                drop.life -= 0.003;
                
                return drop.life > 0;
            });
        }
        
        // 主绘制函数
        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            const squares = getSquares();
            
            // 更新波浪
            waveOffset += 0.5;
            
            // 绘制三个正方形
            // 先画c正方形（斜边），然后是a和b正方形
            drawRotatedWaterSquare(squares.squareC, 'c²');
            drawWaterSquare(squares.squareA, 'a²');
            drawWaterSquare(squares.squareB, 'b²');
            
            // 绘制三角形
            drawTriangle();
            
            // 绘制水滴
            drawWaterDrops();
            
            // 更新信息
            updateInfo(squares.sides);
        }
        
        // 更新信息显示
        function updateInfo(sides) {
            const a2 = Math.round(sides.a * sides.a);
            const b2 = Math.round(sides.b * sides.b);
            const c2 = Math.round(sides.c * sides.c);
            
            document.getElementById('formula').textContent = 
                `${Math.round(sides.a)}² + ${Math.round(sides.b)}² = ${Math.round(sides.c)}²`;
            document.getElementById('values').textContent = 
                `${a2} + ${b2} = ${c2}`;
            document.getElementById('progressFill').style.width = 
                `${pourProgress * 100}%`;
        }
        
        // 开始倾倒动画
        function startPour() {
            if (isPouring) return;
            isPouring = true;
            
            document.getElementById('pourBtn').disabled = true;
            
            // 清理可能存在的旧interval
            if (dropIntervalId) {
                clearInterval(dropIntervalId);
                dropIntervalId = null;
            }
            
            // 持续创建水滴 - 从大正方形C
            dropIntervalId = setInterval(() => {
                if (!isPouring || pourProgress >= 1) {
                    if (dropIntervalId) {
                        clearInterval(dropIntervalId);
                        dropIntervalId = null;
                    }
                    return;
                }
                
                // 从大正方形创建水滴，随机流向A或B
                if (waterLevelC > 0.1) {
                    waterDrops.push(createWaterDrop('C'));
                }
            }, 80);
            
            // 动画时长 4.5 秒
            const duration = 4500;
            const startTime = Date.now();
            
            function animate() {
                const elapsed = Date.now() - startTime;
                pourProgress = Math.min(elapsed / duration, 1);
                
                // 更新水位 - 大正方形下降，小正方形上升
                waterLevelC = Math.max(0, 1 - pourProgress);  // 大正方形完全流空
                waterLevelA = pourProgress;  // 水流向两个小正方形，最终都满
                waterLevelB = pourProgress;
                
                // 更新水滴
                updateWaterDrops();
                
                // 绘制
                draw();
                
                if (pourProgress < 1) {
                    animationId = requestAnimationFrame(animate);
                } else {
                    isPouring = false;
                    document.getElementById('pourBtn').disabled = false;
                    waterDrops = [];
                    draw();
                }
            }
            
            animate();
        }
        
        // 重置动画
        function resetAnimation() {
            // 清理所有动画定时器
            if (animationId) {
                cancelAnimationFrame(animationId);
                animationId = null;
            }
            if (dropIntervalId) {
                clearInterval(dropIntervalId);
                dropIntervalId = null;
            }
            
            isPouring = false;
            pourProgress = 0;
            waterLevelA = 0;
            waterLevelB = 0;
            waterLevelC = 1;
            waterDrops = [];
            
            document.getElementById('pourBtn').disabled = false;
            document.getElementById('progressFill').style.width = '0%';
            
            initTriangle();
            draw();
        }
        
        // 鼠标事件
        canvas.addEventListener('mousedown', (e) => {
            if (isPouring) return;
            
            const rect = canvas.getBoundingClientRect();
            const tx = e.clientX - rect.left;
            const ty = e.clientY - rect.top;
            const x = invTransformX(tx);
            const y = invTransformY(ty);
            
            const hitRadius = 30 / scale;
            
            // 检测顶点点击
            if (Math.hypot(x - B.x, y - B.y) < hitRadius) {
                dragging = 'B';
                canvas.style.cursor = 'grabbing';
            } else if (Math.hypot(x - C.x, y - C.y) < hitRadius) {
                dragging = 'C';
                canvas.style.cursor = 'grabbing';
            }
        });
        
        canvas.addEventListener('mousemove', (e) => {
            if (!dragging) {
                // 鼠标悬停效果
                const rect = canvas.getBoundingClientRect();
                const tx = e.clientX - rect.left;
                const ty = e.clientY - rect.top;
                const x = invTransformX(tx);
                const y = invTransformY(ty);
                const hitRadius = 30 / scale;
                
                if (Math.hypot(x - B.x, y - B.y) < hitRadius || 
                    Math.hypot(x - C.x, y - C.y) < hitRadius) {
                    canvas.style.cursor = 'grab';
                } else {
                    canvas.style.cursor = 'default';
                }
                return;
            }
            
            const rect = canvas.getBoundingClientRect();
            const tx = e.clientX - rect.left;
            const ty = e.clientY - rect.top;
            const x = invTransformX(tx);
            const y = invTransformY(ty);
            
            // 边界限制
            const minSize = 60;
            const maxSize = 280;
            
            if (dragging === 'B') {
                // B只能在A上方移动
                const newY = Math.max(A.y - maxSize, Math.min(A.y - minSize, y));
                B.x = A.x;
                B.y = newY;
            } else if (dragging === 'C') {
                // C只能在A右侧移动
                const newX = Math.max(A.x + minSize, Math.min(A.x + maxSize, x));
                C.x = newX;
                C.y = A.y;
            }
            
            calculateScale();
            draw();
        });
        
        canvas.addEventListener('mouseup', () => {
            dragging = null;
            canvas.style.cursor = 'default';
        });
        
        canvas.addEventListener('mouseleave', () => {
            dragging = null;
            canvas.style.cursor = 'default';
        });
        
        // 初始化
        initTriangle();
        draw();
    </script>
</body>
</html>
