<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>几何旋转变换演示</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: "Microsoft YaHei", "Segoe UI", Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            color: #fff;
            overflow: hidden;
        }
        
        .container {
            display: flex;
            height: 100vh;
            padding: 20px;
            gap: 20px;
        }
        
        .canvas-wrapper {
            flex: 1;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        
        .canvas-header {
            background: linear-gradient(90deg, #2196F3, #00BCD4);
            padding: 12px 20px;
            font-size: 18px;
            font-weight: bold;
            text-align: center;
            color: #fff;
            letter-spacing: 2px;
        }
        
        .canvas-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        #mainCanvas {
            background: #fff;
            border-radius: 8px;
            cursor: crosshair;
        }
        
        .control-panel {
            width: 320px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        
        .panel-section {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
        }
        
        .section-title {
            font-size: 16px;
            font-weight: bold;
            color: #1a1a2e;
            margin-bottom: 16px;
            padding-bottom: 10px;
            border-bottom: 2px solid #e0e0e0;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .section-title::before {
            content: '';
            width: 4px;
            height: 18px;
            background: linear-gradient(180deg, #2196F3, #00BCD4);
            border-radius: 2px;
        }
        
        .triangle-type-options {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
        }
        
        .triangle-type-btn {
            padding: 12px 8px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            background: #f8f9fa;
            color: #333;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
        }
        
        .triangle-type-btn:hover {
            border-color: #2196F3;
            background: #e3f2fd;
            transform: translateY(-2px);
        }
        
        .triangle-type-btn.active {
            border-color: #2196F3;
            background: linear-gradient(135deg, #2196F3, #00BCD4);
            color: #fff;
            box-shadow: 0 4px 15px rgba(33, 150, 243, 0.4);
        }
        
        .triangle-icon {
            font-size: 22px;
        }
        
        .type-hint {
            font-size: 10px;
            opacity: 0.8;
            font-weight: normal;
        }
        
        .control-group {
            margin-bottom: 18px;
        }
        
        .control-label {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            font-size: 14px;
            color: #555;
        }
        
        .control-value {
            background: #e3f2fd;
            color: #1565C0;
            padding: 4px 12px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 14px;
        }
        
        .slider {
            width: 100%;
            height: 8px;
            border-radius: 4px;
            background: #e0e0e0;
            outline: none;
            -webkit-appearance: none;
            cursor: pointer;
        }
        
        .slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: linear-gradient(135deg, #2196F3, #00BCD4);
            cursor: pointer;
            box-shadow: 0 2px 10px rgba(33, 150, 243, 0.5);
            transition: transform 0.2s;
        }
        
        .slider::-webkit-slider-thumb:hover {
            transform: scale(1.1);
        }
        
        .slider::-moz-range-thumb {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: linear-gradient(135deg, #2196F3, #00BCD4);
            cursor: pointer;
            border: none;
            box-shadow: 0 2px 10px rgba(33, 150, 243, 0.5);
        }
        
        .direction-toggle {
            display: flex;
            gap: 10px;
        }
        
        .direction-btn {
            flex: 1;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            background: #f8f9fa;
            color: #555;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .direction-btn:hover {
            border-color: #2196F3;
        }
        
        .direction-btn.active {
            border-color: #2196F3;
            background: #2196F3;
            color: #fff;
        }
        
        .center-options {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        
        .center-option {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 12px;
            background: #f8f9fa;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 2px solid transparent;
        }
        
        .center-option:hover {
            background: #e3f2fd;
        }
        
        .center-option.active {
            border-color: #2196F3;
            background: #e3f2fd;
        }
        
        .center-option input {
            accent-color: #2196F3;
            width: 18px;
            height: 18px;
        }
        
        .center-option label {
            color: #333;
            cursor: pointer;
            font-size: 14px;
        }
        
        .action-buttons {
            display: flex;
            gap: 10px;
        }
        
        .action-btn {
            flex: 1;
            padding: 14px;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        
        .play-btn {
            background: linear-gradient(135deg, #4CAF50, #8BC34A);
            color: #fff;
        }
        
        .play-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(76, 175, 80, 0.4);
        }
        
        .play-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        
        .reset-btn {
            background: linear-gradient(135deg, #ff9800, #ffc107);
            color: #fff;
        }
        
        .reset-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 152, 0, 0.4);
        }
        
        .legend {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        
        .legend-item {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 13px;
            color: #555;
        }
        
        .legend-color {
            width: 24px;
            height: 4px;
            border-radius: 2px;
        }
        
        .legend-color.original {
            background: #2196F3;
        }
        
        .legend-color.rotated {
            background: #f44336;
        }
        
        .legend-color.trail {
            background: linear-gradient(90deg, rgba(33, 150, 243, 0.3), rgba(244, 67, 54, 0.3));
        }
        
        .tip-box {
            background: #fff3e0;
            border-left: 4px solid #ff9800;
            padding: 12px;
            border-radius: 0 10px 10px 0;
            font-size: 13px;
            color: #e65100;
            line-height: 1.6;
        }
        
        .formula-display {
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            padding: 14px;
            border-radius: 10px;
            text-align: center;
            font-size: 15px;
            color: #4fc3f7;
            font-family: "Times New Roman", serif;
            letter-spacing: 1px;
        }
        
        /* 题目框样式 */
        .question-box {
            background: #fff8dc;
            border: 2px solid #d4a017;
            border-radius: 10px;
            padding: 4px 8px;
            margin-bottom: 5px;
            font-size: 13px;
            color: #5d4e0e;
            line-height: 1.3;
            text-align: center;
            max-width: 200px;
        }
        .question-box strong {
            color: #8b6914;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="canvas-wrapper">
            <div class="canvas-header">📐 几何旋转变换演示</div>
            <div class="canvas-container">
                <canvas id="mainCanvas" width="600" height="600"></canvas>
            </div>
        </div>
        
        <div class="question-box">
            <strong>📖</strong>将图形绕旋转中心旋转，观察前后关系。旋转不改变形状大小，对应点到旋转中心距离相等。
        </div>
        
        <div class="control-panel">
            <div class="panel-section">
                <div class="section-title">三角形类型</div>
                <div class="triangle-type-options">
                    <button class="triangle-type-btn active" data-triangle-type="equilateral">
                        <span class="triangle-icon">△</span>
                        <span>等边三角形</span>
                        <span class="type-hint">三边相等</span>
                    </button>
                    <button class="triangle-type-btn" data-triangle-type="isosceles">
                        <span class="triangle-icon">△</span>
                        <span>等腰三角形</span>
                        <span class="type-hint">两边相等</span>
                    </button>
                    <button class="triangle-type-btn" data-triangle-type="right">
                        <span class="triangle-icon">▷</span>
                        <span>直角三角形</span>
                        <span class="type-hint">一个直角</span>
                    </button>
                    <button class="triangle-type-btn" data-triangle-type="scalene">
                        <span class="triangle-icon">▽</span>
                        <span>一般三角形</span>
                        <span class="type-hint">三边不等</span>
                    </button>
                </div>
            </div>
            
            <div class="panel-section">
                <div class="section-title">旋转中心</div>
                <div class="center-options">
                    <div class="center-option active" data-center="center">
                        <input type="radio" name="center" value="center" checked>
                        <label>图形中心</label>
                    </div>
                    <div class="center-option" data-center="origin">
                        <input type="radio" name="center" value="origin">
                        <label>原点 (0, 0)</label>
                    </div>
                    <div class="center-option" data-center="custom">
                        <input type="radio" name="center" value="custom">
                        <label>自定义点（拖动设置）</label>
                    </div>
                </div>
            </div>
            
            <div class="panel-section">
                <div class="section-title">旋转参数</div>
                <div class="control-group">
                    <div class="control-label">
                        <span>旋转角度</span>
                        <span class="control-value" id="angleValue">45°</span>
                    </div>
                    <input type="range" class="slider" id="angleSlider" min="0" max="360" value="45">
                </div>
                
                <div class="control-group">
                    <div class="control-label">
                        <span>旋转方向</span>
                    </div>
                    <div class="direction-toggle">
                        <button class="direction-btn active" data-direction="counterclockwise">
                            ↺ 逆时针
                        </button>
                        <button class="direction-btn" data-direction="clockwise">
                            ↻ 顺时针
                        </button>
                    </div>
                </div>
                
                <div class="formula-display" id="formulaDisplay">
                    旋转公式：x' = x·cosθ - y·sinθ，y' = x·sinθ + y·cosθ
                </div>
            </div>
            
            <div class="panel-section">
                <div class="section-title">图例说明</div>
                <div class="legend">
                    <div class="legend-item">
                        <div class="legend-color original"></div>
                        <span>原图形</span>
                    </div>
                    <div class="legend-item">
                        <div class="legend-color rotated"></div>
                        <span>旋转后图形</span>
                    </div>
                    <div class="legend-item">
                        <div class="legend-color trail"></div>
                        <span>旋转轨迹</span>
                    </div>
                </div>
            </div>
            
            <div class="panel-section">
                <div class="section-title">动画控制</div>
                <div class="action-buttons">
                    <button class="action-btn play-btn" id="playBtn">
                        <span>▶</span>
                        <span>播放动画</span>
                    </button>
                    <button class="action-btn reset-btn" id="resetBtn">
                        <span>↺</span>
                        <span>重置</span>
                    </button>
                </div>
            </div>
            
            <div class="panel-section">
                <div class="tip-box">
                    💡 提示：拖动画布上的圆点可调整旋转中心位置，动画播放时将展示完整的旋转过程。
                </div>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('mainCanvas');
        const ctx = canvas.getContext('2d');
        
        // 状态变量
        let triangleType = 'equilateral'; // equilateral, isosceles, right, scalene
        let rotationAngle = 45;
        let rotationDirection = 'counterclockwise';
        let centerType = 'center';
        let customCenter = { x: 300, y: 300 };
        let isAnimating = false;
        let animationProgress = 0;
        let showTrail = false;
        let isDraggingCenter = false;
        
        // 图形尺寸
        const shapeSize = 120;
        const centerPointRadius = 8;
        
        // 颜色配置
        const colors = {
            original: '#2196F3',
            rotated: '#f44336',
            center: '#9C27B0',
            grid: '#e0e0e0',
            axis: '#9e9e9e',
            trail: 'rgba(156, 39, 176, 0.3)'
        };
        
        // 获取旋转中心坐标
        function getRotationCenter() {
            switch (centerType) {
                case 'center':
                    return getShapeCenter();
                case 'origin':
                    return { x: canvas.width / 2, y: canvas.height / 2 };
                case 'custom':
                    return customCenter;
                default:
                    return getShapeCenter();
            }
        }
        
        // 获取图形中心
        function getShapeCenter() {
            const vertices = getShapeVertices(triangleType, 0);
            let sumX = 0, sumY = 0;
            vertices.forEach(v => {
                sumX += v.x;
                sumY += v.y;
            });
            return {
                x: sumX / vertices.length + canvas.width / 2,
                y: sumY / vertices.length + canvas.height / 2
            };
        }
        
        // 获取三角形顶点
        function getShapeVertices(type, angle) {
            const vertices = [];
            
            switch (type) {
                case 'equilateral':
                    // 等边三角形：三个顶点，角度间隔120度
                    for (let i = 0; i < 3; i++) {
                        const theta = (i * 2 * Math.PI / 3) - Math.PI / 2;
                        vertices.push({
                            x: shapeSize * Math.cos(theta),
                            y: shapeSize * Math.sin(theta)
                        });
                    }
                    break;
                    
                case 'isosceles':
                    // 等腰三角形：顶角在上，底边较短
                    // 顶点A在顶部，底边BC较宽
                    vertices.push(
                        { x: 0, y: -shapeSize * 1.1 },           // A: 顶部顶点
                        { x: -shapeSize * 0.9, y: shapeSize * 0.6 },  // B: 左下
                        { x: shapeSize * 0.9, y: shapeSize * 0.6 }    // C: 右下
                    );
                    break;
                    
                case 'right':
                    // 直角三角形：直角在左上角
                    vertices.push(
                        { x: -shapeSize * 0.5, y: -shapeSize * 0.8 },  // A: 直角顶点
                        { x: shapeSize * 0.8, y: -shapeSize * 0.8 },   // B: 右顶点
                        { x: -shapeSize * 0.5, y: shapeSize * 0.8 }   // C: 下顶点
                    );
                    break;
                    
                case 'scalene':
                    // 一般三角形：三边均不相等
                    vertices.push(
                        { x: -shapeSize * 0.6, y: -shapeSize * 0.7 },  // A: 左上
                        { x: shapeSize * 0.9, y: -shapeSize * 0.4 },  // B: 右上
                        { x: shapeSize * 0.2, y: shapeSize * 0.9 }    // C: 下
                    );
                    break;
                    
                default:
                    // 默认返回等边三角形
                    for (let i = 0; i < 3; i++) {
                        const theta = (i * 2 * Math.PI / 3) - Math.PI / 2;
                        vertices.push({
                            x: shapeSize * Math.cos(theta),
                            y: shapeSize * Math.sin(theta)
                        });
                    }
            }
            
            return vertices;
        }
        
        // 旋转点
        function rotatePoint(x, y, cx, cy, angle) {
            const cosA = Math.cos(angle);
            const sinA = Math.sin(angle);
            const dx = x - cx;
            const dy = y - cy;
            return {
                x: cx + dx * cosA - dy * sinA,
                y: cy + dx * sinA + dy * cosA
            };
        }
        
        // 绘制网格
        function drawGrid() {
            const gridSize = 30;
            ctx.strokeStyle = colors.grid;
            ctx.lineWidth = 0.5;
            
            for (let x = 0; x <= canvas.width; x += gridSize) {
                ctx.beginPath();
                ctx.moveTo(x, 0);
                ctx.lineTo(x, canvas.height);
                ctx.stroke();
            }
            
            for (let y = 0; y <= canvas.height; y += gridSize) {
                ctx.beginPath();
                ctx.moveTo(0, y);
                ctx.lineTo(canvas.width, y);
                ctx.stroke();
            }
        }
        
        // 绘制坐标轴
        function drawAxis() {
            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;
            
            ctx.strokeStyle = colors.axis;
            ctx.lineWidth = 1.5;
            
            // X轴
            ctx.beginPath();
            ctx.moveTo(0, centerY);
            ctx.lineTo(canvas.width, centerY);
            ctx.stroke();
            
            // Y轴
            ctx.beginPath();
            ctx.moveTo(centerX, 0);
            ctx.lineTo(centerX, canvas.height);
            ctx.stroke();
            
            // 原点标记
            ctx.fillStyle = colors.axis;
            ctx.beginPath();
            ctx.arc(centerX, centerY, 4, 0, Math.PI * 2);
            ctx.fill();
            
            // 坐标轴标签
            ctx.font = '12px Arial';
            ctx.fillStyle = '#666';
            ctx.fillText('O', centerX - 15, centerY + 15);
            ctx.fillText('x', canvas.width - 15, centerY - 10);
            ctx.fillText('y', centerX + 10, 15);
        }
        
        // 绘制图形
        function drawShape(vertices, color, lineWidth = 2, fillAlpha = 0.15) {
            ctx.strokeStyle = color;
            ctx.lineWidth = lineWidth;
            ctx.fillStyle = color.replace(')', `, ${fillAlpha})`).replace('rgb', 'rgba');
            
            ctx.beginPath();
            ctx.moveTo(vertices[0].x, vertices[0].y);
            for (let i = 1; i < vertices.length; i++) {
                ctx.lineTo(vertices[i].x, vertices[i].y);
            }
            ctx.closePath();
            ctx.fill();
            ctx.stroke();
        }
        
        // 绘制顶点标记
        function drawVertices(vertices, color) {
            ctx.fillStyle = color;
            vertices.forEach(v => {
                ctx.beginPath();
                ctx.arc(v.x, v.y, 5, 0, Math.PI * 2);
                ctx.fill();
            });
        }
        
        // 绘制旋转中心
        function drawRotationCenter() {
            const center = getRotationCenter();
            
            // 外圈
            ctx.beginPath();
            ctx.arc(center.x, center.y, centerPointRadius, 0, Math.PI * 2);
            ctx.fillStyle = colors.center;
            ctx.fill();
            
            // 内圈
            ctx.beginPath();
            ctx.arc(center.x, center.y, centerPointRadius - 3, 0, Math.PI * 2);
            ctx.fillStyle = '#fff';
            ctx.fill();
            
            // 十字
            ctx.strokeStyle = colors.center;
            ctx.lineWidth = 1.5;
            ctx.beginPath();
            ctx.moveTo(center.x - 12, center.y);
            ctx.lineTo(center.x + 12, center.y);
            ctx.moveTo(center.x, center.y - 12);
            ctx.lineTo(center.x, center.y + 12);
            ctx.stroke();
            
            // 标签
            if (centerType === 'custom') {
                ctx.font = 'bold 12px Arial';
                ctx.fillStyle = colors.center;
                ctx.fillText('O', center.x + 15, center.y - 10);
            }
        }
        
        // 绘制旋转角度弧线
        function drawAngleArc(angle) {
            if (angle === 0) return;
            
            const center = getRotationCenter();
            const vertices = getShapeVertices(triangleType, 0);
            const firstVertex = vertices[0];
            
            const radius = 50;
            const startAngle = -Math.PI / 2;
            const endAngle = startAngle + (rotationDirection === 'counterclockwise' ? angle : -angle) * Math.PI / 180;
            
            // 绘制弧线
            ctx.beginPath();
            ctx.arc(center.x, center.y, radius, Math.min(startAngle, endAngle), Math.max(startAngle, endAngle), rotationDirection === 'clockwise');
            ctx.strokeStyle = '#FF9800';
            ctx.lineWidth = 3;
            ctx.stroke();
            
            // 绘制角度符号
            const midAngle = (startAngle + endAngle) / 2;
            const labelX = center.x + (radius + 20) * Math.cos(midAngle);
            const labelY = center.y + (radius + 20) * Math.sin(midAngle);
            
            ctx.font = 'bold 14px Arial';
            ctx.fillStyle = '#FF9800';
            ctx.fillText(`${Math.abs(angle)}°`, labelX - 10, labelY + 5);
            
            // 绘制箭头
            const arrowX = center.x + radius * Math.cos(endAngle);
            const arrowY = center.y + radius * Math.sin(endAngle);
            
            ctx.beginPath();
            ctx.arc(arrowX, arrowY, 5, 0, Math.PI * 2);
            ctx.fillStyle = '#FF9800';
            ctx.fill();
        }
        
        // 绘制旋转轨迹
        function drawRotationTrail(progress) {
            if (!showTrail || progress === 0) return;
            
            const center = getRotationCenter();
            const vertices = getShapeVertices(triangleType, 0);
            const actualAngle = rotationDirection === 'counterclockwise' ? progress : -progress;
            
            // 计算三角形外接圆半径（近似使用最大顶点到中心的距离）
            let maxRadius = 0;
            vertices.forEach(v => {
                const dist = Math.sqrt((v.x) ** 2 + (v.y) ** 2);
                maxRadius = Math.max(maxRadius, dist);
            });
            
            // 绘制轨迹圆
            ctx.beginPath();
            ctx.arc(center.x, center.y, maxRadius, 0, Math.PI * 2);
            ctx.strokeStyle = colors.trail;
            ctx.lineWidth = 2;
            ctx.setLineDash([5, 5]);
            ctx.stroke();
            ctx.setLineDash([]);
            
            // 绘制旋转过程中的几个中间位置
            const trailCount = 5;
            for (let i = 1; i <= trailCount; i++) {
                const trailAngle = actualAngle * (i / trailCount);
                const trailVertices = vertices.map(v => rotatePoint(v.x + canvas.width / 2, v.y + canvas.height / 2, center.x, center.y, trailAngle));
                
                ctx.strokeStyle = `rgba(156, 39, 176, ${0.1 * (1 - i / trailCount)})`;
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.moveTo(trailVertices[0].x, trailVertices[0].y);
                for (let j = 1; j < trailVertices.length; j++) {
                    ctx.lineTo(trailVertices[j].x, trailVertices[j].y);
                }
                ctx.closePath();
                ctx.stroke();
            }
        }
        
        // 绘制顶点连线
        function drawVertexConnections(vertices, color) {
            ctx.strokeStyle = color;
            ctx.lineWidth = 2;
            ctx.setLineDash([4, 4]);
            
            const center = getRotationCenter();
            vertices.forEach(v => {
                ctx.beginPath();
                ctx.moveTo(center.x, center.y);
                ctx.lineTo(v.x, v.y);
                ctx.stroke();
            });
            
            ctx.setLineDash([]);
        }
        
        // 主绘制函数
        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // 绘制背景
            ctx.fillStyle = '#fff';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            drawGrid();
            drawAxis();
            
            const center = getRotationCenter();
            const vertices = getShapeVertices(triangleType, 0);
            const adjustedVertices = vertices.map(v => ({
                x: v.x + canvas.width / 2,
                y: v.y + canvas.height / 2
            }));
            
            const angle = rotationDirection === 'counterclockwise' ? rotationAngle : -rotationAngle;
            const angleRad = angle * Math.PI / 180;
            const rotatedVertices = adjustedVertices.map(v => rotatePoint(v.x, v.y, center.x, center.y, angleRad));
            
            // 绘制旋转轨迹
            drawRotationTrail(isAnimating ? animationProgress : rotationAngle);
            
            // 绘制原图形
            drawShape(adjustedVertices, colors.original);
            drawVertices(adjustedVertices, colors.original);
            drawVertexConnections(adjustedVertices, colors.original);
            
            // 绘制旋转后图形
            drawShape(rotatedVertices, colors.rotated, 3);
            drawVertices(rotatedVertices, colors.rotated);
            
            // 绘制旋转中心
            drawRotationCenter();
            
            // 绘制角度弧线
            if (rotationAngle > 0 && !isAnimating) {
                drawAngleArc(rotationAngle);
            }
            
            // 如果是自定义中心，绘制可拖动点
            if (centerType === 'custom') {
                canvas.style.cursor = 'grab';
            } else {
                canvas.style.cursor = 'default';
            }
        }
        
        // 动画播放
        function playAnimation() {
            if (isAnimating) return;
            
            isAnimating = true;
            showTrail = true;
            document.getElementById('playBtn').disabled = true;
            
            const totalFrames = 60;
            const targetAngle = rotationAngle;
            let currentFrame = 0;
            
            function animate() {
                currentFrame++;
                animationProgress = (currentFrame / totalFrames) * targetAngle;
                
                draw();
                
                if (currentFrame < totalFrames) {
                    requestAnimationFrame(animate);
                } else {
                    isAnimating = false;
                    showTrail = false;
                    document.getElementById('playBtn').disabled = false;
                    animationProgress = 0;
                    draw();
                }
            }
            
            animate();
        }
        
        // 重置
        function reset() {
            if (isAnimating) return;
            
            rotationAngle = 0;
            document.getElementById('angleSlider').value = 0;
            document.getElementById('angleValue').textContent = '0°';
            showTrail = false;
            animationProgress = 0;
            draw();
        }
        
        // 鼠标事件处理
        function handleMouseDown(e) {
            if (centerType !== 'custom') return;
            
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            
            const center = getRotationCenter();
            const dist = Math.sqrt((x - center.x) ** 2 + (y - center.y) ** 2);
            
            if (dist <= centerPointRadius + 10) {
                isDraggingCenter = true;
                canvas.style.cursor = 'grabbing';
            }
        }
        
        function handleMouseMove(e) {
            if (!isDraggingCenter) return;
            
            const rect = canvas.getBoundingClientRect();
            customCenter.x = e.clientX - rect.left;
            customCenter.y = e.clientY - rect.top;
            
            draw();
        }
        
        function handleMouseUp() {
            isDraggingCenter = false;
            if (centerType === 'custom') {
                canvas.style.cursor = 'grab';
            }
        }
        
        // 事件监听器
        canvas.addEventListener('mousedown', handleMouseDown);
        canvas.addEventListener('mousemove', handleMouseMove);
        canvas.addEventListener('mouseup', handleMouseUp);
        canvas.addEventListener('mouseleave', handleMouseUp);
        
        // 触摸事件支持
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            handleMouseDown({ clientX: touch.clientX, clientY: touch.clientY });
        });
        
        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            handleMouseMove({ clientX: touch.clientX, clientY: touch.clientY });
        });
        
        canvas.addEventListener('touchend', handleMouseUp);
        
        // 三角形类型选择
        document.querySelectorAll('.triangle-type-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.triangle-type-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                triangleType = btn.dataset.triangleType;
                draw();
            });
        });
        
        // 中心选择
        document.querySelectorAll('.center-option').forEach(opt => {
            opt.addEventListener('click', () => {
                document.querySelectorAll('.center-option').forEach(o => o.classList.remove('active'));
                opt.classList.add('active');
                centerType = opt.dataset.center;
                opt.querySelector('input').checked = true;
                draw();
            });
        });
        
        // 角度滑块
        document.getElementById('angleSlider').addEventListener('input', (e) => {
            rotationAngle = parseInt(e.target.value);
            document.getElementById('angleValue').textContent = `${rotationAngle}°`;
            draw();
        });
        
        // 旋转方向
        document.querySelectorAll('.direction-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.direction-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                rotationDirection = btn.dataset.direction;
                draw();
            });
        });
        
        // 播放按钮
        document.getElementById('playBtn').addEventListener('click', playAnimation);
        
        // 重置按钮
        document.getElementById('resetBtn').addEventListener('click', reset);
        
        // 初始绘制
        draw();
    </script>
</body>
</html>
